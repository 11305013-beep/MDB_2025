              「新濱町合美運送組」是日治時期隨高雄港築港工程興起，於1908年在高雄新濱町一丁目創立的物流運輸公司，「以牛車、人力運貨至港裝船，一樓為店舖、二樓為住家，展現哈瑪星『下店上住』街屋特色」（林宛臻，2019）。建築採用了和洋混合風格，兼具日本與西方建築的元素。該公司因應了高雄港的物流需求，是早期伴隨高雄港發展的物流運輸公司，代表了高雄港商業與工業發展，見證了高雄從漁港轉型為港都的歷史過程。

    <!--
      Text 設定
      https://mdbootstrap.com/docs/standard/utilities/text/

      等寬字體 font-monospace

      大小 fs-{value}、h{value}
      value: 1(大) ~ 6(小)

      對齊 text-{斷點}-{value}
      value: start(左)、center(中)、end(右)、justify(左右對齊)

      樣式 fw-{value}、fst-{value}
      粗體:fw-bold、fw-bolder    輕量:fw-light、fw-lighter   斜體:fst-italic

      行高 lh-{value}
      value: 1、sm、base、lg

      文字裝飾 text-decoration-{value}
      value: underline(底線)、line-through(刪除線)、none(無)

      大小寫轉換 text-{value}
      value: uppercase(全大寫)、lowercase(全小寫)、capitalize(字首大寫)

      換行 text-{value}，內容需設定寬度
      value: wrap(換行)、nowrap(不換行，超出邊界)、truncate(隱藏多餘字，設定5表示第5個字開始隱藏)

      <div class="badge bg-primary text-wrap" style="width: 6rem">高雄市立三民家商</div>
      <div class="badge bg-primary text-nowrap" style="width: 6rem">高雄市立三民家商</div>
      <div class="badge bg-primary text-truncate" style="width: 6rem">高雄市立三民家商</div>


      文字截斷 text-truncate
      https://mdbootstrap.com/docs/standard/utilities/text-truncation/

      EX:

      1.Block level
      <div class="row">
        <div class="col-2 text-truncate">This text is quite long, and will be truncated once displayed.</div>
      </div>

      2.Inline level
      <span class="d-inline-block text-truncate" style="max-width: 150px">
        This text is quite long, and will be truncated once displayed.
      </span>
    -->

      <!--
        透明度 https://mdbootstrap.com/docs/standard/utilities/opacity/

        value: 0、25、50、75、100
        1.一般透明 opacity-{value}

        value: 1 ~ 5

          <img class="img-fluid rounded-4 shadow-2-strong">

          <div class="shadow-custom"></div>
      -->
























        <!--  顯示模式display -->
        <!--  https://mdbootstrap.com/docs/standard/layout/display/ -->

        <!--  行內元素：d-inline  -->
        <!--  同一行內呈現，不可設定長寬，元素的寬高由它的內容撐開，不能設定上下的 margin、padding。  -->
        <!--  常見行內元素標籤：span、a、imput、img  -->

        <!--  區塊元素：d-block  -->
        <!--  元素寬度預設會撐到最大，向右占滿容器，下個元素就會換行來呈現，並不會並排。  -->
        <!--  常見區塊元素標籤：div、ul li、p、h1  -->

        <!--  行內區塊：d-inline-block  -->
        <!--  以inline的方式呈現，不會向右占滿整個容器，可設定元素的寬高、margin、padding，可水平排列。  -->

        <!--  可見度: -->
        <!--  https://mdbootstrap.com/docs/standard/utilities/visibility/ -->
        <!--  使用可見性通用類別設置元素的 visibility。這不會改變 display 值 ， .invisible 元素仍會佔用頁面空間 -->
        <!--  d-none 隱藏 、 invisible 隱藏(保留實體空間) 、 顯示 visible -->

        <!--  Visible on all        .d-block -->
        <!--  Visible only on xs    .d-block .d-sm-none -->
        <!--  Visible only on sm    .d-none .d-sm-block .d-md-none -->
        <!--  Hidden on all         .d-none -->
        <!--  Hidden only on xs     .d-none .d-sm-block -->
        <!--  Hidden only on sm     .d-sm-none .d-md-block -->

        <!--  example:  -->
        <!--  d-none             全部設為隱藏    -->
        <!--  d-sm-block         sm設為block    -->
