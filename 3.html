                        <h2 class="mb-5  fw-bold ">文化資產</h2>

                        <p class="lead text-muted fw-normal mb-4 text-justify">
                            文化資產是指在歷史、藝術或文化層面上具有特殊價值,能夠承載某一文化群體的歷史記憶、傳統和藝術成就的資源。這些資產既可以是有形的物體,如古蹟、文物、建築,也可以是無形的,如傳統知識、民間故事和節慶。文化資產對於維護和傳承一個族群或國家的文化身份和歷史背景至關重要。


                        </p>
                        <p class="lead text-muted fw-normal mb-4 text-justify">
                            這些資產不僅反映過去的社會樣貌，也能傳遞給後代，幫助理解歷史變遷與文化發展。其保護需要政府、專業機構與大眾共同努力，透過法律制度、修復與教育推廣加以保存。


                        </p>
